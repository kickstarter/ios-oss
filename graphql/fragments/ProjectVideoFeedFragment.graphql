# Minimal version of ProjectFragment, containing only the fields needed for showing video feed cells.
fragment ProjectVideoFeedFragment on Project {
  id
  pid
  name
  slug
  percentFunded
  deadlineAt
  launchedAt
  backersCount
  pledged {
    amount
  }
  creator {
    name
    imageUrl(blur: false, width: 200)
  }
  category {
    name
  }
  verticalVideo {
    id
    previewImageUrl
    videoSources {
      hls {
        src
      }
    }
  }
}

fragment ProjectFragment on Project {
  availableCardTypes
  backersCount
  category {
    ...CategoryFragment
  }
  canComment
  commentsCount(withReplies: true)
  country {
    ...CountryFragment
  }
  creator {
    ...PublicUserFragment
  }
  currency
  deadlineAt
  description
  ...ExtendedProjectPropertiesFragment
  finalCollectionDate
  fxRate
  goal {
    ...MoneyFragment
  }
  image {
    id
    url(width: 1024)
  }
  isProjectWeLove
  isProjectOfTheDay
  isWatched
  isLaunched
  isInPostCampaignPledgingPhase
  lastWave {
    ...LastWaveFragment
  }
  launchedAt
  location {
    ...LocationFragment
  }
  maxPledge
  minPledge
  name
  ...NoRewardRewardFragment
  pid
  pledgeManager {
    ...PledgeManagerFragment
  }
  pledged {
    ...MoneyFragment
  }
  ...PledgeOverTimeFragment
  postCampaignPledgingEnabled
  posts {
    totalCount
  }
  prelaunchActivated
  redemptionPageUrl
  sendMetaCapiEvents
  slug
  state
  stateChangedAt
  tags(scope: DISCOVER) {
    name
  }
  url
  usdExchangeRate
  video {
    ...ProjectVideoFragment
  }
  watchesCount
}

fragment ProjectFragment on Project {
  availableCardTypes
  backersCount
  category {
    ...CategoryFragment
  }
  canComment
  commentsCount(withReplies: true)
  country {
    ...CountryFragment
  }
  creator {
    ...PublicUserFragment
  }
  currency
  deadlineAt
  description
  finalCollectionDate
  fxRate
  goal {
    ...MoneyFragment
  }
  image {
    id
    url(width: 1024)
  }
  isPledgeOverTimeAllowed
  isProjectWeLove
  isProjectOfTheDay
  isWatched
  isLaunched
  isInPostCampaignPledgingPhase
  lastWave {
    ...LastWaveFragment
  }
  launchedAt
  location {
    ...LocationFragment
  }
  maxPledge
  minPledge
  name
  pid
  pledgeManager {
    ...PledgeManagerFragment
  }
  pledgeOverTimeCollectionPlanChargeExplanation
  pledgeOverTimeCollectionPlanChargedAsNPayments
  pledgeOverTimeCollectionPlanShortPitch
  pledgeOverTimeMinimumExplanation
  pledged {
    ...MoneyFragment
  }
  postCampaignPledgingEnabled
  posts {
    totalCount
  }
  prelaunchActivated
  redemptionPageUrl
  sendMetaCapiEvents
  slug
  state
  stateChangedAt
  tags(scope: DISCOVER) {
    name
  }
  url
  usdExchangeRate
  video {
    id
    videoSources {
      high {
        src
      }
      hls {
        src
      }
    }
  }
  watchesCount
  ...NoRewardRewardFragment
  ...ExtendedProjectPropertiesFragment
}

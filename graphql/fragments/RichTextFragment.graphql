fragment RichTextItemFragment on RichTextItem {
  ... on RichText {
    text
    link
    styles
  }
  ... on RichTextHeader {
    text
    link
    styles
  }
  ... on RichTextListItem {
    text
    link
    styles
  }
  ... on RichTextListOpen {
    _present
  }
  ... on RichTextListClose {
    _present
  }
  ... on RichTextPhoto {
    altText
    asset {
      id
    }
    caption
    url
  }
  ... on RichTextAudio {
    altText
    asset {
      id
    }
    caption
    url
  }
  ... on RichTextVideo {
    altText
    asset {
      id
    }
    caption
    url
  }
  ... on RichTextOembed {
    width
    height
    version
    title
    type

    iframeUrl
    originalUrl
    photoUrl

    thumbnailHeight
    thumbnailUrl
    thumbnailWidth
  }
}

fragment RichTextComponentFragment on RichTextComponent {
  items {
    ...RichTextItemFragment
    ... on RichText {
      children {
        ...RichTextItemFragment
      }
    }
    ... on RichTextHeader {
      children {
        ...RichTextItemFragment
      }
    }
    ... on RichTextListItem {
      children {
        ...RichTextItemFragment
      }
    }
  }
}

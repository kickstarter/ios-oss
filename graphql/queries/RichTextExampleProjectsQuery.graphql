query RichTextExampleProjectsQuery{
  projects(recommended: true, first: 10) {
    nodes{
      id
      name
      storyRichText {
        ...RichTextComponentFragment
      }
    }
  }
}

query RichTextExampleProjectBySlugQuery($slug: String!){
  project(slug: $slug) {
    id
    name
    storyRichText {
      ...RichTextComponentFragment
    }
  }
}


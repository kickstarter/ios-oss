query FetchBacking($id: ID!, $includeShippingRules: Boolean!, $includeLocalPickup: Boolean!) {
  backing(id: $id) {
    addOns {
      nodes {
        ...RewardFragment
      }
    }
    ...BackingFragment
    project {
      ...ProjectFragment
    }
    paymentIncrements {
      ...PaymentIncrementFragment
    }
  }
}

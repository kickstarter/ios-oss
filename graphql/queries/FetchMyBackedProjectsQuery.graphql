query FetchMyBackedProjects($first: Int = null, $after: String = null) {
  projects(first: $first, after: $after, backed: true, sort: END_DATE) {
    nodes {
      ...ProjectCardFragment
    }
    pageInfo {
      hasNextPage
      endCursor
      hasPreviousPage
      startCursor
    }
    totalCount
  }
}



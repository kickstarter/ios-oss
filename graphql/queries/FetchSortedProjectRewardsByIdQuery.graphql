query FetchSortedProjectRewardsById($projectId: Int!, $includeShippingRules: Boolean!, $includeLocalPickup: Boolean!, $location: CountryCode, $locationID: ID) {
  project(pid: $projectId) {
    ...NoRewardRewardFragment
    rewards(location: $location, sort: ELIGIBILITY) {
      nodes {
        ...RewardFragment
        shippingRulesExpanded(forLocation: $locationID) {
          nodes {
            ...ShippingRuleFragment
          }
        }
      }
    }
  }
}

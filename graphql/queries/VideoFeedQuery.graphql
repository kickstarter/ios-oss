query VideoFeed($first: Int!, $after: String, $categoryId: String) {
  videoFeed(first: $first, after: $after, categoryId: $categoryId) {
    pageInfo {
        hasNextPage
        endCursor
        hasPreviousPage
        startCursor
    }
    nodes {
      badges {
        type
        text
        icon
      }
      project {
        id
        pid
        name
        slug
        percentFunded
        deadlineAt
        launchedAt
        backersCount
        pledged {
          amount
        }
        creator {
          name
          imageUrl(blur: false, width: 200)
        }
        category {
          name
        }
        lastUploadedVerticalVideo {
          id
          previewImageUrl
          videoSources {
            hls {
              src
            }
          }
        }
      }
    }
  }
}

# Query used to fetch the backing for the Manage Pledge page.
query FetchBackingWithIncrementsRefunded($id: ID!) {
  backing(id: $id) {
    addOns {
      nodes {
        ...RewardFragment
      }
    }
    ...BackingFragment
    reward {
      ...SimpleShippingRulesExpandedFragment
    }
    paymentIncrements {
      ...PaymentIncrementBackingFragment
    }
  }
}

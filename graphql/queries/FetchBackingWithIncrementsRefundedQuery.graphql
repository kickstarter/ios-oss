query FetchBackingWithIncrementsRefunded($id: ID!, $includeShippingRules: Boolean!, $includeLocalPickup: Boolean!) {
  backing(id: $id) {
    addOns {
      nodes {
        ...RewardFragment
      }
    }
    ...BackingFragment
    paymentIncrements {
      ...PaymentIncrementBackingFragment
    }
  }
}

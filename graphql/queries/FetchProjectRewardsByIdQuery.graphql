query FetchProjectRewardsById($projectId: Int!, $includeShippingRules: Boolean!, $includeLocalPickup: Boolean!, $includePledgeOverTime: Boolean!, $sort: ProjectRewardsSort, $location: CountryCode) {
  project(pid: $projectId) {
    rewards(sort: $sort, location: $location) {
      nodes {
        ...RewardFragment
        simpleShippingRulesExpanded @include(if: $includeShippingRules) {
            cost,
            estimatedMin,
            estimatedMax,
            currency,
            locationId,
            locationName,
            country
        }
      }
    }
    ...PledgeOverTimeFragment @include(if: $includePledgeOverTime)
  }
}

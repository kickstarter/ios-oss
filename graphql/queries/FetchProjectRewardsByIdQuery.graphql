query FetchProjectRewardsById($projectId: Int!, $includeShippingRules: Boolean!, $includeLocalPickup: Boolean!) {
  project(pid: $projectId) {
    rewards {
      nodes {
        ...RewardFragment
        ...SimpleShippingRulesExpandedFragment @include(if: $includeShippingRules) 
      }
    }
  }
}

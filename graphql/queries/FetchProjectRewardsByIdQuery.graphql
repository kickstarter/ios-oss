query FetchProjectRewardsById($projectId: Int!, $includeShippingRules: Boolean!, $includeLocalPickup: Boolean!, $includePledgeOverTime: Boolean!, $location: CountryCode, $sort: ProjectRewardsSort) {
  project(pid: $projectId) {
    rewards(location: $location, sort: $sort) {
      nodes {
        ...RewardFragment
        simpleShippingRulesExpanded @include(if: $includeShippingRules) {
            cost,
            estimatedMin,
            estimatedMax,
            currency,
            locationId,
            locationName,
            country
        }
      }
    }
    ...PledgeOverTimeFragment @include(if: $includePledgeOverTime)
    ...NoRewardRewardFragment
  }
}
